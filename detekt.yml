# Detekt configuration focused on actionable issues.

build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true
  exclude:
    - "TxtOutputReport"
    - "MdOutputReport"

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 12
  NestedBlockDepth:
    active: true
    threshold: 5
  TooManyFunctions:
    active: true
    thresholdInFiles: 15
    thresholdInClasses: 20
    thresholdInInterfaces: 15
    thresholdInObjects: 15
    thresholdInEnums: 15

empty-blocks:
  active: true
  EmptyFunctionBlock:
    active: false

exceptions:
  active: true
  SwallowedException:
    active: false
  TooGenericExceptionCaught:
    active: false

formatting:
  active: true
  autoCorrect: true
  android: true
  CommentSpacing:
    active: true
    autoCorrect: true
  FinalNewline:
    active: true
    autoCorrect: true
    insertFinalNewLine: true
  Indentation:
    active: false
  ImportOrdering:
    active: true
    autoCorrect: true
    layout: "ascii"
    sortByAlias: false
  MaximumLineLength:
    active: false
  NoBlankLineBeforeRbrace:
    active: true
    autoCorrect: true
  NoConsecutiveBlankLines:
    active: true
    autoCorrect: true
  NoUnusedImports:
    active: true
    autoCorrect: true
  NoWildcardImports:
    active: false
  SpacingBetweenDeclarationsWithComments:
    active: false

style:
  active: true
  MaxLineLength:
    active: false
  MagicNumber:
    active: false
  ReturnCount:
    active: false
  WildcardImport:
    active: false
